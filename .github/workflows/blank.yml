name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # 1. Checkout your app's code
    - uses: actions/checkout@v4

    # 2. Set up Java
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    # 3. Checkout the LibXposed repository into a subfolder
    - name: Checkout LibXposed API repository
      uses: actions/checkout@v4
      with:
        repository: libxposed/api # Verify this is the exact repo name you need
        path: libxposed-source

    # 4. Build LibXposed and publish it to the runner's local Maven cache
    - name: Publish LibXposed to Maven Local
      run: |
        cd libxposed-source
        chmod +x gradlew
        ./gradlew publishToMavenLocal
    
    # 5. Generate the Gradle wrapper
    - name: Generate Gradle wrapper
      run: gradle wrapper

    # 6. Prepare your app's Gradle wrapper
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 7. Build your app (Gradle will now find LibXposed in mavenLocal!)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 8. Upload the generated APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: app/build/outputs/apk/debug/app-debug.apk
